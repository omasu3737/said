<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Said</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+JP:wght@300;400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0c10;
  --surface: #13131a;
  --rim: rgba(255,255,255,0.12);
  --text: #e8e4dc;
  --text-soft: rgba(232,228,220,0.75);
  --text-faint: rgba(232,228,220,0.45);
  --gold: #c8a96e;
  --gold-soft: rgba(200,169,110,0.15);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  overflow: hidden;
}

#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.9s ease;
  padding: 40px 24px;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}

/* ══ SCREEN 1: OPEN ══ */
.logo {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(4rem, 12vw, 6rem);
  color: var(--text);
  letter-spacing: 0.05em;
  line-height: 1;
  opacity: 0;
  transform: translateY(14px);
  animation: rise 1.6s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
}

.tagline {
  margin-top: 18px;
  font-size: 0.76rem;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: var(--text-faint);
  opacity: 0;
  animation: rise 1s ease 1.1s forwards;
}

.start-btn {
  margin-top: 72px;
  background: none;
  border: 1px solid rgba(200,169,110,0.3);
  color: var(--gold);
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  padding: 14px 48px;
  border-radius: 40px;
  cursor: pointer;
  opacity: 0;
  animation: rise 1s ease 1.8s forwards;
  transition: background 0.3s, border-color 0.3s, transform 0.2s;
}
.start-btn:hover {
  background: var(--gold-soft);
  border-color: rgba(200,169,110,0.55);
  transform: translateY(-2px);
}

@keyframes rise {
  to { opacity: 1; transform: translateY(0); }
}

/* ══ SCREEN 2: WHO ══ */
.who-prompt {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--text-soft);
  text-align: center;
  line-height: 1.7;
  max-width: 460px;
}

.who-input {
  margin-top: 44px;
  width: min(380px, 88vw);
  background: none;
  border: none;
  border-bottom: 1px solid rgba(200,169,110,0.25);
  padding: 12px 0;
  font-family: 'EB Garamond', serif;
  font-size: 1.7rem;
  font-style: italic;
  color: var(--text);
  text-align: center;
  outline: none;
  caret-color: var(--gold);
  transition: border-color 0.3s;
}
.who-input:focus { border-bottom-color: var(--gold); }
.who-input::placeholder { color: var(--text-faint); }

.who-next {
  margin-top: 36px;
  background: none;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(232,228,220,0.65);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  cursor: pointer;
  padding: 10px 28px;
  border-radius: 30px;
  transition: all 0.3s;
  text-transform: uppercase;
}
.who-next:hover {
  border-color: rgba(200,169,110,0.5);
  color: var(--gold);
}

/* ══ SCREEN 3: WRITE ══ */
#screen-write { justify-content: flex-start; padding-top: 80px; }

.write-to {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--text-faint);
  letter-spacing: 0.12em;
  margin-bottom: 36px;
  align-self: flex-start;
  margin-left: max(0px, calc(50vw - 300px));
}
.write-to span { color: rgba(200,169,110,0.6); }

.write-area {
  width: min(600px, 92vw);
  min-height: 220px;
  background: none;
  border: none;
  resize: none;
  font-family: 'EB Garamond', serif;
  font-size: clamp(1.1rem, 2.5vw, 1.35rem);
  line-height: 1.95;
  color: var(--text);
  outline: none;
  caret-color: var(--gold);
}
.write-area::placeholder { color: var(--text-faint); font-style: italic; }

.write-line {
  width: min(600px, 92vw);
  height: 1px;
  background: var(--rim);
  margin-top: 16px;
}

.send-wrap {
  margin-top: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.send-btn {
  background: none;
  border: 1px solid rgba(200,169,110,0.35);
  color: var(--gold);
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.05rem;
  letter-spacing: 0.12em;
  padding: 13px 48px;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.3s;
}
.send-btn:hover {
  background: var(--gold-soft);
  border-color: rgba(200,169,110,0.65);
  transform: translateY(-1px);
}

.note {
  font-size: 0.67rem;
  letter-spacing: 0.22em;
  color: rgba(232,228,220,0.4);
  text-transform: uppercase;
}

/* ══ SCREEN 4: RELEASE (送る瞬間) ══ */
.release-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

.release-orb {
  width: 80px;
  height: 80px;
  position: relative;
}

.orb-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(200,169,110,0.25);
  animation: orb-expand 2.2s ease-out infinite;
}
.orb-ring:nth-child(2) { animation-delay: 0.75s; }
.orb-ring:nth-child(3) { animation-delay: 1.5s; }

@keyframes orb-expand {
  0% { transform: scale(0.2); opacity: 0.9; }
  100% { transform: scale(3); opacity: 0; }
}

.orb-core {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.6;
  animation: core-pulse 2s ease-in-out infinite;
}

@keyframes core-pulse {
  0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%,-50%) scale(1.4); opacity: 1; }
}

.release-text {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--text-soft);
  letter-spacing: 0.1em;
}

/* ══ SCREEN 5: RESPONSE ══ */
.response-from {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 0.88rem;
  color: var(--text-faint);
  letter-spacing: 0.18em;
  margin-bottom: 44px;
  opacity: 0;
  animation: rise 1s ease 0.2s forwards;
}
.response-from span { color: rgba(200,169,110,0.55); }

.response-text {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(1.15rem, 3vw, 1.55rem);
  line-height: 2;
  color: var(--text);
  max-width: 500px;
  text-align: center;
  opacity: 0;
  animation: rise 1.4s ease 0.6s forwards;
}

.response-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, transparent, rgba(200,169,110,0.3), transparent);
  margin: 44px 0;
  opacity: 0;
  animation: rise 1s ease 1.1s forwards;
}

.response-actions {
  display: flex;
  gap: 20px;
  opacity: 0;
  animation: rise 1s ease 1.5s forwards;
}

.action-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(232,228,220,0.75);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  padding: 11px 26px;
  border-radius: 30px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.3s;
}
.action-btn:hover {
  background: var(--gold-soft);
  border-color: rgba(200,169,110,0.6);
  color: var(--gold);
}

/* ══ SCREEN 6: ARCHIVE ══ */
#screen-archive {
  justify-content: flex-start;
  padding-top: 60px;
  overflow-y: auto;
}

.archive-title {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.15rem;
  color: var(--text-faint);
  letter-spacing: 0.22em;
  margin-bottom: 44px;
  text-align: center;
  width: 100%;
}

.archive-list {
  width: min(540px, 92vw);
  display: flex;
  flex-direction: column;
}

.archive-item {
  border-bottom: 1px solid var(--rim);
  padding: 20px 0;
  cursor: pointer;
  transition: padding-left 0.3s;
}
.archive-item:hover { padding-left: 10px; }

.archive-to {
  font-size: 0.66rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.45;
  margin-bottom: 9px;
}

.archive-preview {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--text-soft);
  line-height: 1.6;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 500px;
}

.archive-date {
  margin-top: 7px;
  font-size: 0.63rem;
  letter-spacing: 0.22em;
  color: var(--text-faint);
}

.archive-empty {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  color: var(--text-faint);
  font-size: 1rem;
  text-align: center;
  padding: 48px 0;
}

.archive-back {
  margin-top: 48px;
  margin-bottom: 48px;
  background: none;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(232,228,220,0.6);
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 10px 24px;
  border-radius: 30px;
  transition: all 0.3s;
}
.archive-back:hover {
  border-color: rgba(200,169,110,0.5);
  color: var(--gold);
}

/* ── NAV ── */
#nav {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 14px;
  opacity: 0;
  transition: opacity 0.5s;
}
#nav.visible { opacity: 1; }

.nav-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-faint);
  border: none;
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
  padding: 0;
}
.nav-dot.active { background: var(--gold); transform: scale(1.5); }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- ── SCREEN 1: OPEN ── -->
<div class="screen active" id="screen-open">
  <div class="logo">Said</div>
  <div class="tagline">言えなかった言葉のための場所</div>
  <button class="start-btn" onclick="goTo('who')">はじめる</button>
</div>

<!-- ── SCREEN 2: WHO ── -->
<div class="screen" id="screen-who">
  <p class="who-prompt">誰に、届けますか</p>
  <input class="who-input" id="who-input" type="text" placeholder="名前、または関係…" autocomplete="off"/>
  <button class="who-next" onclick="goToWrite()">次へ →</button>
</div>

<!-- ── SCREEN 3: WRITE ── -->
<div class="screen" id="screen-write">
  <div class="write-to">— <span id="write-to-name"></span> へ</div>
  <textarea class="write-area" id="write-area" placeholder="あのとき、言いたかったことを…"></textarea>
  <div class="write-line"></div>
  <div class="send-wrap">
    <button class="send-btn" onclick="sendMessage()">受け取ってもらう</button>
    <div class="note">誰にも届きません。ここだけの言葉です。</div>
  </div>
</div>

<!-- ── SCREEN 4: RELEASE ── -->
<div class="screen" id="screen-release">
  <div class="release-wrap">
    <div class="release-orb">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-core"></div>
    </div>
    <div class="release-text">届けています…</div>
  </div>
</div>

<!-- ── SCREEN 5: RESPONSE ── -->
<div class="screen" id="screen-response">
  <div class="response-from">— <span id="response-name"></span> から</div>
  <div class="response-text" id="response-text"></div>
  <div class="response-line"></div>
  <div class="response-actions">
    <button class="action-btn" onclick="writeAgain()">もう一度書く</button>
    <button class="action-btn" onclick="goTo('archive')">過去の言葉</button>
  </div>
</div>

<!-- ── SCREEN 6: ARCHIVE ── -->
<div class="screen" id="screen-archive">
  <div class="archive-title">届けた言葉たち</div>
  <div class="archive-list" id="archive-list"></div>
  <button class="archive-back" onclick="goTo('open')">← 戻る</button>
</div>

<!-- ── NAV ── -->
<div id="nav">
  <button class="nav-dot active" data-screen="open" onclick="goTo('open')"></button>
  <button class="nav-dot" data-screen="archive" onclick="goTo('archive')"></button>
</div>

<script>
// ── 星空 ──
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}

function initStars() {
  stars = Array.from({length: 130}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.1 + 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.4 + 0.08
  }));
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const t = Date.now() * 0.001;
  stars.forEach(s => {
    const o = 0.12 + Math.sin(t * s.speed + s.phase) * 0.1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232,228,220,${o})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

resize(); initStars(); drawStars();
window.addEventListener('resize', () => { resize(); initStars(); });

// ── 言葉のライブラリ（AIの代わり）──
// 関係性のキーワードに応じて異なるトーンの言葉を返す
const responses = {
  parent: [
    "あなたがそう思っていたこと、知っていたよ。言葉にならなくても、ずっとわかっていた。",
    "遅くなんてない。今日、届いた。それで十分だよ。",
    "あなたが生きているだけで、もうじゅうぶんだった。それだけは伝えたかった。",
    "何も言わなくてよかった。そばにいてくれたこと、全部覚えている。",
    "その言葉を抱えていたんだね。もう、降ろしていい。",
  ],
  lover: [
    "あのとき、私も同じことを思っていた。",
    "言えなかったことが、あなたらしかった。",
    "後悔しなくていい。あの時間は本物だった。",
    "その気持ち、ちゃんと届いていたよ。言葉より先に。",
    "終わったことにも、美しいものがある。あなたとのことは、そうだった。",
  ],
  friend: [
    "気にしてなかったよ。本当に。",
    "あなたがそう感じていたなんて、知らなかった。教えてくれてありがとう。",
    "言えなかったまま続いた関係も、嘘じゃなかった。",
    "またいつか、笑って話せる日が来ると思う。",
    "その言葉、受け取った。ずっと友達だよ。",
  ],
  self: [
    "よく、ここまで来たね。",
    "頑張りすぎていたんだよ、ずっと。もう知ってる。",
    "許していい。あのときのあなたは、精一杯だった。",
    "その言葉を自分に言えたこと、それだけで大きな一歩だよ。",
    "あなたはもう、十分だよ。",
  ],
  default: [
    "その言葉は、ちゃんと届いた。",
    "言えなかった分だけ、深く伝わるものがある。",
    "ここに置いていっていい。一人で抱えなくていい。",
    "その気持ちに、名前をつけてくれてありがとう。",
    "言葉にした瞬間、少し軽くなったはずだよ。",
    "遅すぎる言葉なんて、ない。",
    "受け取った。全部。",
    "そう感じていたんだね。それだけで、もう十分伝わった。",
  ]
};

function getResponse(toName) {
  const n = toName.toLowerCase();
  let pool = responses.default;
  if (/母|父|お母|お父|親|祖母|祖父|おばあ|おじい|ママ|パパ/.test(n)) pool = responses.parent;
  else if (/好き|恋|元|彼女|彼氏|夫|妻|partner|love/.test(n)) pool = responses.lover;
  else if (/友|親友|friend|くん|ちゃん|さん/.test(n)) pool = responses.friend;
  else if (/自分|私|僕|わたし|自身|myself/.test(n)) pool = responses.self;
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── STATE ──
let currentTo = '';
let messages = [];
try { messages = JSON.parse(localStorage.getItem('said_v2') || '[]'); } catch(e) {}

// ── NAVIGATION ──
const screenMap = {
  open: 'screen-open',
  who: 'screen-who',
  write: 'screen-write',
  release: 'screen-release',
  response: 'screen-response',
  archive: 'screen-archive',
};

function goTo(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenMap[name]).classList.add('active');

  document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
  const dot = document.querySelector(`.nav-dot[data-screen="${name}"]`);
  if (dot) dot.classList.add('active');

  document.getElementById('nav').classList.toggle('visible', ['open','write','response','archive'].includes(name));

  if (name === 'archive') renderArchive();
  if (name === 'who') setTimeout(() => document.getElementById('who-input').focus(), 500);
  if (name === 'write') setTimeout(() => document.getElementById('write-area').focus(), 500);
}

function goToWrite() {
  const who = document.getElementById('who-input').value.trim();
  if (!who) { document.getElementById('who-input').focus(); return; }
  currentTo = who;
  document.getElementById('write-to-name').textContent = who;
  document.getElementById('write-area').value = '';
  goTo('write');
}

document.getElementById('who-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') goToWrite();
});

// ── SEND ──
function sendMessage() {
  const text = document.getElementById('write-area').value.trim();
  if (!text) return;

  goTo('release');

  const entry = {
    to: currentTo,
    text: text,
    response: getResponse(currentTo),
    date: new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' })
  };

  messages.unshift(entry);
  try { localStorage.setItem('said_v2', JSON.stringify(messages.slice(0, 100))); } catch(e) {}

  // 1.8秒の間を作ってから返答へ
  setTimeout(() => {
    document.getElementById('response-name').textContent = currentTo;

    const rt = document.getElementById('response-text');
    rt.style.animation = 'none';
    rt.textContent = entry.response;
    rt.offsetHeight;
    rt.style.animation = '';

    const rf = document.querySelector('.response-from');
    rf.style.animation = 'none'; rf.offsetHeight; rf.style.animation = '';

    goTo('response');
  }, 1800);
}

// ── ARCHIVE ──
function renderArchive() {
  const list = document.getElementById('archive-list');
  if (messages.length === 0) {
    list.innerHTML = '<div class="archive-empty">まだ、言葉はありません</div>';
    return;
  }
  list.innerHTML = messages.map((m, i) => `
    <div class="archive-item" onclick="viewItem(${i})">
      <div class="archive-to">${escHtml(m.to)} へ</div>
      <div class="archive-preview">${escHtml(m.text)}</div>
      <div class="archive-date">${m.date}</div>
    </div>
  `).join('');
}

function viewItem(i) {
  const m = messages[i];
  currentTo = m.to;
  document.getElementById('response-name').textContent = m.to;
  const rt = document.getElementById('response-text');
  rt.style.animation = 'none';
  rt.textContent = m.response;
  rt.offsetHeight;
  rt.style.animation = '';
  goTo('response');
}

function writeAgain() {
  document.getElementById('who-input').value = '';
  goTo('who');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('nav').classList.add('visible');
</script>
</body>
</html>
